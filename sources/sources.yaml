      method: crawlee
      notes: Financial statements available. Some paid.

    - name: Northdata
      url: https://northdata.de
      data: [company, directors, financials]
      access: aggregator
      method: browser-use
      proxy_tier: tor

  AT:
    - name: Firmenbuch
      url: https://justizonline.gv.at
      data: [company, directors]
      access: paid_portal
      waf: login_gated
      method: sequentum
      proxy_tier: tor
      notes: Paid per extract. No open API.

  CH:
    - name: ZEFIX
      url: https://zefix.ch
