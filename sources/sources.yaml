# ----------------------- PROFESSIONAL NETWORK / WEB -------------------------
# NOTE: LinkedIn and company websites carry elevated legal/ToS exposure.
# See docs/COMPLIANCE.md — these live in a separate, explicitly-gated tier.
web_and_network:
  - id: company-websites
    name: Company websites (contact / team / about pages)
    country: XX
    category: company_web
    access: scrape
    url: per-company (resolved from registry domain)
    refresh: monthly
    cost: free
    auth: none
    waf: mixed
    method: screaming_frog_then_playwright   # SF bulk crawl, browser fallback
    tier: T4_web
    legal: Public pages; respect robots.txt + rate limits; PII → GDPR tagging.
    confidence: verified
  - id: linkedin
    name: LinkedIn (public profiles via search engines)
    country: XX
    category: professional_network
    access: scrape
    url: https://www.linkedin.com/
    refresh: monthly
    cost: free
    auth: none
    waf: login_wall
    method: serp_discovery   # discover public profiles via search engines only
    tier: T4_web
    legal: ELEVATED RISK. ToS prohibits automated access. hiQ v LinkedIn is
           unsettled and the LinkedIn UA/Microsoft posture is aggressive. Use
           only public data surfaced via search engines; NEVER automate logged-in
           sessions. Gated behind explicit operator sign-off. See COMPLIANCE.md.
    confidence: verified
