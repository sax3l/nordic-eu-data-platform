      access: open_portal
      method: crawlee
      proxy_tier: self_hosted
      refresh: monthly

  FR:
    - name: SIRENE API
      url: https://api.insee.fr/entreprises/sirene/V3
      api: same
      data: [company]
      access: open_api
      format: json
      bulk: true
      waf: none
      method: curl_cffi
      proxy_tier: none
