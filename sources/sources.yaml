# =============================================================================
# SOURCE REGISTRY — every website / dataset with recurring B2B data
# =============================================================================
# This is the machine-readable index the orchestrator consumes. Each entry is a
# RECURRING data source: a place we re-harvest on a cadence to keep the warehouse
# fresh. The adaptive router reads `access` + `waf` + `method` to choose how to
# fetch, and `refresh` to schedule re-harvest.
#
# FIELDS
#   id          unique slug
#   name        human name
#   country     ISO-3166 alpha-2, or "XX" for cross-border
#   category    company_registry | financials | directors_ubo | contacts_directory
#               | professional_network | company_web | vehicle_registry
#               | crossborder | buy_signal
#   access      api | bulk | open_data | scrape | ui_automation
#   url         primary endpoint / portal
#   refresh     realtime | daily | weekly | monthly | quarterly | annual
#   cost        free | freemium | paid | restricted
#   auth        none | apikey | account | oauth | gov_credential
#   waf         none | cloudflare | datadome | akamai | imperva | login_wall | unknown
#   method      preferred harvest method (see catalog/methods/)
#   tier        T1_primary_official | T2_aggregator | T3_directory | T4_web | T5_benchmark
#   legal       note on lawful basis / ToS posture
#   confidence  verified | likely | uncertain   (uncertain = pending research pass)
# =============================================================================

# Confidence on EU entries is being independently web-verified by the running
# research workflow; country-data/ holds the verified per-country detail.

crossborder:
  - id: gleif-lei
    name: GLEIF — Legal Entity Identifier (golden cross-border key)
    country: XX
    category: crossborder
    access: bulk
    url: https://www.gleif.org/en/lei-data/gleif-concatenated-file
    refresh: daily
    cost: free
    auth: none
    waf: none
    method: bulk_download
    tier: T1_primary_official
    legal: Open data (CC0). Use as the join key across national registries.
    confidence: verified

  - id: opencorporates
    name: OpenCorporates — aggregated global company register
    country: XX
    category: company_registry
    access: api
    url: https://api.opencorporates.com/
    refresh: weekly
    cost: freemium
    auth: apikey
    waf: cloudflare
    method: api_then_curl_cffi
    tier: T2_aggregator
    legal: API ToS applies; bulk reuse is licensed. Prefer national registries first.
    confidence: verified

  - id: eu-bris
    name: BRIS / e-Justice Business Registers Interconnection
    country: XX
    category: company_registry
    access: scrape
    url: https://e-justice.europa.eu/content_find_a_company-489-en.do
    refresh: monthly
    cost: free
    auth: none
    waf: unknown
    method: playwright
    tier: T1_primary_official
    legal: Official EU portal federating national registers.
    confidence: likely

  - id: opensanctions
    name: OpenSanctions — PEP / sanctions / watchlists
    country: XX
    category: buy_signal
    access: bulk
    url: https://www.opensanctions.org/datasets/
    refresh: daily
    cost: free
    auth: none
    waf: none
    method: bulk_download
    tier: T1_primary_official
    legal: Open data; for screening/compliance enrichment.
    confidence: verified

