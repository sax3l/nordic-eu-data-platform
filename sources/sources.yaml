      notes: Multi-step wizard. Sequentum visual matching ideal.

# Cross-border golden keys
gleif:
  name: GLEIF (Global LEI)
  url: https://api.gleif.org/api/v1/lei-records
  api: same
  data: [company, company_parent, cross_border_key]
  access: open_api
  format: json
  bulk: true
  waf: none
  method: curl_cffi
  proxy_tier: none
  refresh: daily
  notes: Golden key for cross-border company linking. Free, open.
