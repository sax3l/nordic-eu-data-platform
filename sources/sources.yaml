# Sources Registry — Complete 20-Country Data Source Inventory
# Machine-readable source registry for the adaptive orchestrator.
# Field reference:
#   name: Human-readable source name
#   url: Base URL
#   api: API endpoint (null if no API)
#   data: [company, directors, financials, vehicles, contacts, legal_notices]
#   access: open_api | open_portal | stateful_portal | paid_portal | aggregator
#   format: json | html | pdf | csv
#   bulk: true/false — can we download ALL records at once?
#   waf: none | soft | cf | datadome | login_gated
#   method: preferred extraction method (see catalog/methods/)
#   proxy_tier: none | free | self_hosted | tor
#   rate_limit: requests per minute/hour
#   refresh: daily | weekly | monthly | quarterly
#   notes: Important gotchas

countries:
  SE:
    - name: Bolagsverket API
      url: https://api.bolagsverket.se/naringsliv/v1
      api: same
      data: [company, directors, financials_basic]
      access: open_api
      format: json
      bulk: true
      waf: none
      method: curl_cffi
      proxy_tier: none
      rate_limit: 60/min
      refresh: weekly
      notes: Primary source. Board members included. Free.

    - name: Transportstyrelsen
      url: https://transportstyrelsen.se
      api: null
      data: [vehicles]
      access: open_api
      format: json
      bulk: false
      waf: soft
      method: crawlee
      proxy_tier: self_hosted
      rate_limit: 30/min
      refresh: daily

    - name: Allabolag.se
      url: https://allabolag.se
      api: null
      data: [company, directors, financials]
      access: aggregator
      format: html
      bulk: false
      waf: soft
      method: crawlee
      proxy_tier: self_hosted
      refresh: monthly

    - name: Merinfo.se
      url: https://merinfo.se
      api: null
      data: [company, contacts, vehicles]
      access: aggregator
      format: html
      bulk: false
      waf: soft
      method: curl_cffi
      proxy_tier: self_hosted
      refresh: monthly

    - name: Ratsit.se
      url: https://ratsit.se
      api: null
      data: [company, directors, contacts]
      access: aggregator
      method: curl_cffi
      proxy_tier: self_hosted

  NO:
    - name: Brreg API
      url: https://data.brreg.no/enhetsregisteret/api
      api: same
      data: [company, directors, financials]
      access: open_api
      format: json
      bulk: true
      waf: none
      method: curl_cffi
      proxy_tier: none
      rate_limit: 1000/hour
      refresh: weekly

    - name: Proff.no
      url: https://proff.no
      data: [company, financials, directors]
      access: aggregator
      method: curl_cffi
      proxy_tier: self_hosted

  DK:
    - name: CVR API
      url: https://datacvr.virk.dk/data
      api: https://cvrapi.dk/api
      data: [company, contacts]
      access: open_api
      format: json
      bulk: true
      waf: none
      method: curl_cffi
      proxy_tier: none
      rate_limit: 100/hour
      refresh: weekly
      notes: Use cvrapi.dk for faster access. Elasticsearch bulk available.

  FI:
    - name: PRH API
      url: https://avoindata.prh.fi
      api: same
      data: [company, directors]
      access: open_api
      format: json
      bulk: true
      waf: none
      method: curl_cffi
      proxy_tier: none
      refresh: weekly

    - name: Traficom
      url: https://traficom.fi
      data: [vehicles]
      access: open_api
      method: curl_cffi
      refresh: daily

  IS:
    - name: RSK
      url: https://rsk.is
      data: [company, contacts]
      access: open_portal
      method: crawlee
      proxy_tier: self_hosted
      refresh: monthly

  DE:
    - name: Handelsregister
      url: https://handelsregister.de
      api: null
      data: [company, directors]
      access: stateful_portal
      format: html
      bulk: false
      waf: cf
      method: sequentum
      proxy_tier: tor
      notes: Hardest market. No API. CF + stateful. Sequentum visual matching.

    - name: Unternehmensregister
      url: https://unternehmensregister.de
      data: [financials]
