# prometheus.yml — Nordic+EU Data Platform monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "/etc/prometheus/alerts/*.yml"

scrape_configs:
  - job_name: "platform-orchestrator"
    static_configs:
      - targets: ["orchestrator:8000"]
    metrics_path: "/metrics"

  - job_name: "worker-browser"
    static_configs:
      - targets: ["worker-browser:9090"]

  - job_name: "worker-ocr"
    static_configs:
      - targets: ["worker-ocr:9090"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
    metrics_path: "/metrics"

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:5432"]

  - job_name: "proxy-rotator"
    static_configs:
      - targets: ["proxy-rotator:5555"]

  - job_name: "ollama"
    static_configs:
      - targets: ["ollama:11434"]
    metrics_path: "/metrics"

  - job_name: "unstructured"
    static_configs:
      - targets: ["unstructured:8000"]
    metrics_path: "/metrics"
